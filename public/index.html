<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATM Finder</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
  }

  h1 {
    margin-bottom: 10px;
    font-size: 22px;
  }

  p {
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 20px;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #2563eb;
  }

  .small {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.6;
  }
</style>
</head>

<body>

<div class="card">
  <h1>💳 ATM Finder</h1>
  <p>Find nearest ATMs & cash points instantly</p>

  <button onclick="findATMs()">Find ATMs near me</button>

  <div class="small">Uses your location & Google Maps</div>
</div>

<script>
function findATMs() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition((pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const url = `https://www.google.com/maps/search/ATM/@${lat},${lon},15z`;

    window.open(url, "_blank");
  }, () => {
    alert("Location access denied");
  });
}
</script>

</body>
</html>
