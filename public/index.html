<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Готівка поруч</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0b1220;
  color: white;
}

.header {
  padding: 28px 20px;
  background: linear-gradient(135deg, #1d4ed8, #2563eb);
  border-bottom-left-radius: 22px;
  border-bottom-right-radius: 22px;
}

.header h1 {
  margin: 0;
  font-size: 24px;
}

.header p {
  margin-top: 8px;
  font-size: 13px;
  opacity: 0.9;
}

.container {
  padding: 18px;
}

.status {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 14px;
  font-size: 13px;
  color: #93c5fd;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 16px;
  border-radius: 16px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid rgba(255,255,255,0.08);
}

.card:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.1);
}

.icon {
  font-size: 26px;
  margin-bottom: 6px;
}

.btn {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: #22c55e;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

.btn:hover {
  opacity: 0.9;
}

.footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
  margin-top: 22px;
  padding-bottom: 20px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🏧 Готівка поруч</h1>
  <p>Банкомати, Cash Back та АЗС у вашій локації</p>
</div>

<div class="container">

  <div class="status" id="status">
    📍 Очікування визначення геолокації...
  </div>

  <div class="grid">

    <div class="card" onclick="search('ukrsib')">
      <div class="icon">🏦</div>
      <div>УКРСИББАНК</div>
    </div>

    <div class="card" onclick="search('atm')">
      <div class="icon">💳</div>
      <div>ІНШІ БАНКИ</div>
    </div>

    <div class="card" onclick="search('cash')">
      <div class="icon">🛒</div>
      <div>КАСА CASH BACK</div>
    </div>

    <div class="card" onclick="search('fuel')">
      <div class="icon">⛽</div>
      <div>АЗС</div>
    </div>

  </div>

  <button class="btn" onclick="getLocation()">
    📍 Визначити моє місцезнаходження
  </button>

  <div class="footer">
    Нескорені | Юрковецький ліцей
  </div>

</div>

<script>

let lat = null;
let lng = null;

function getLocation() {
  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    status.innerText = "Геолокація не підтримується";
    return;
  }

  status.innerText = "🔄 Визначаємо місцезнаходження...";

  navigator.geolocation.getCurrentPosition((pos) => {
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;

    status.innerText = "✅ Локацію визначено. Оберіть категорію.";
  }, () => {
    status.innerText = "❌ Доступ до геолокації заборонено";
  });
}

function search(type) {

  if (!lat || !lng) {
    alert("Спочатку натисніть 'Визначити місцезнаходження'");
    return;
  }

  let q = "ATM";

  if (type === "ukrsib") q = "УКРСИББАНК банкомат";
  if (type === "atm") q = "банкомат";
  if (type === "cash") q = "cash back магазин";
  if (type === "fuel") q = "АЗС готівка";

  const url = `https://www.google.com/maps/search/${q}/@${lat},${lng},15z`;

  document.getElementById("status").innerText =
    "🗺️ Відкриваємо карту...";

  window.open(url, "_blank");
}

</script>

</body>
</html>
