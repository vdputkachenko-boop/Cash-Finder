<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Готівка поруч</title>

<style>

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: #0b1220;
  color: white;
}

.header {
  padding: 24px 18px;
  background: linear-gradient(135deg, #1d4ed8, #2563eb);
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

.header h1 {
  margin: 0;
  font-size: 20px;
}

.header p {
  margin-top: 6px;
  font-size: 13px;
  opacity: 0.85;
}

.container {
  padding: 16px;
  max-width: 520px;
  margin: auto;
}

.status {
  background: rgba(255,255,255,0.06);
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  margin-bottom: 14px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.2s;
}

.card:active {
  transform: scale(0.98);
}

.icon {
  font-size: 26px;
  margin-bottom: 6px;
}

.btn {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: #22c55e;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.footer {
  text-align: center;
  font-size: 11px;
  opacity: 0.5;
  margin-top: 18px;
}

</style>
</head>

<body>

<div class="header">
  <h1>🏧 Готівка поруч</h1>
  <p>Банкомати, Cash Back та АЗС у вашій локації</p>
</div>

<div class="container">

  <div class="status" id="status">
    📍 Натисніть кнопку для визначення місцезнаходження
  </div>

  <div class="grid">

    <div class="card" onclick="search('ukrsib')">
      <div class="icon">🏦</div>
      УКРСИББАНК
    </div>

    <div class="card" onclick="search('atm')">
      <div class="icon">💳</div>
      БАНКОМАТИ
    </div>

    <div class="card" onclick="search('cash')">
      <div class="icon">🛒</div>
      CASH BACK
    </div>

    <div class="card" onclick="search('fuel')">
      <div class="icon">⛽</div>
      АЗС
    </div>

  </div>

  <button class="btn" onclick="getLocation()">
    📍 Визначити моє місцезнаходження
  </button>

  <div class="footer">
    Cash Finder MVP
  </div>

</div>

<script>

let lat = null;
let lng = null;

/* GEOLOCATION */
function getLocation() {

  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    status.innerText = "❌ Геолокація не підтримується";
    return;
  }

  status.innerText = "🔄 Визначаємо місцезнаходження...";

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;

      status.innerText = "✅ Локацію отримано. Оберіть категорію";
    },
    () => {
      status.innerText = "❌ Не вдалося отримати локацію";
    },
    {
      enableHighAccuracy: true,
      timeout: 10000
    }
  );
}

/* SEARCH (FIXED GOOGLE MAPS API MODE) */
function search(type) {

  if (lat === null || lng === null) {
    alert("Спочатку визначте місцезнаходження 📍");
    return;
  }

  let query = "";

  // 🔥 стабільні запити (не перекладаються Google)
  switch(type) {
    case "ukrsib":
      query = "UKRSIBBANK ATM";
      break;
    case "atm":
      query = "ATM";
      break;
    case "cash":
      query = "cash back store";
      break;
    case "fuel":
      query = "gas station";
      break;
  }

  // ✅ СТАБІЛЬНИЙ ФОРМАТ GOOGLE MAPS
  const url =
    "https://www.google.com/maps/search/?api=1" +
    "&query=" + encodeURIComponent(query) +
    "&center=" + lat + "," + lng +
    "&zoom=15";

  window.open(url, "_blank");
}

</script>

</body>
</html>
