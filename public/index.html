<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Пошук банкоматів</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: rgba(255,255,255,0.06);
    padding: 28px;
    border-radius: 20px;
    text-align: center;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
  }

  h1 {
    font-size: 20px;
    margin-bottom: 8px;
  }

  p {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 20px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
  }

  .primary {
    background: #3b82f6;
    color: white;
  }

  .primary:hover {
    background: #2563eb;
  }

  .secondary {
    background: rgba(255,255,255,0.1);
    color: white;
  }

  .secondary:hover {
    background: rgba(255,255,255,0.2);
  }

  .small {
    margin-top: 12px;
    font-size: 12px;
    opacity: 0.6;
  }
</style>
</head>

<body>

<div class="card">
  <h1>🏧 Пошук банкоматів</h1>
  <p>Знайдіть найближчі банкомати або каси з видачею готівки</p>

  <button class="primary" onclick="знайтиБанкомати()">
    📍 Знайти банкомати поруч
  </button>

  <button class="secondary" onclick="знайтиУкрсиббанк()">
    🏦 Банкомати УКРСИББАНК
  </button>

  <button class="secondary" onclick="знайтиКешбек()">
    💳 Зняття готівки на касі
  </button>

  <div class="small">
    Використовує вашу геолокацію та Google Maps
  </div>
</div>

<script>
function знайтиБанкомати() {
  openMap("ATM");
}

function знайтиУкрсиббанк() {
  openMap("УКРСИББАНК банкомат");
}

function знайтиКешбек() {
  openMap("cash back магазин банкомат");
}

function openMap(query) {
  if (!navigator.geolocation) {
    alert("Геолокація не підтримується");
    return;
  }

  navigator.geolocation.getCurrentPosition((pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const url = `https://www.google.com/maps/search/${query}/@${lat},${lon},15z`;

    window.open(url, "_blank");
  }, () => {
    alert("Доступ до геолокації заборонено");
  });
}
</script>

</body>
</html>
