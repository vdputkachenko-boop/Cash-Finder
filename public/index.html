<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cash Point Finder</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #0b1220;
  color: white;
}

.header {
  padding: 30px 20px;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
}

.header h1 {
  margin: 0;
  font-size: 26px;
}

.header p {
  opacity: 0.9;
  margin-top: 8px;
  font-size: 14px;
}

.container {
  padding: 20px;
}

.status {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
  font-size: 13px;
  color: #93c5fd;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 18px;
  cursor: pointer;
  transition: 0.2s;
  text-align: center;
}

.card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.1);
}

.icon {
  font-size: 28px;
  margin-bottom: 8px;
}

.title {
  font-size: 13px;
  font-weight: 600;
}

.big-btn {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  font-size: 15px;
  cursor: pointer;
}

.big-btn:hover {
  opacity: 0.9;
}

.footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
  margin-top: 25px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🏧 Cash Point Finder</h1>
  <p>Знайди найближчі банкомати, Cash Back та точки видачі готівки</p>
</div>

<div class="container">

  <div class="status" id="status">
    📍 Очікуємо визначення геолокації...
  </div>

  <div class="grid">
    <div class="card" onclick="search('ukrsib')">
      <div class="icon">🏦</div>
      <div class="title">УКРСИББАНК</div>
    </div>

    <div class="card" onclick="search('atm')">
      <div class="icon">💳</div>
      <div class="title">ІНШІ БАНКОМАТИ</div>
    </div>

    <div class="card" onclick="search('cashback')">
      <div class="icon">🛒</div>
      <div class="title">CASH BACK</div>
    </div>

    <div class="card" onclick="search('fuel')">
      <div class="icon">⛽</div>
      <div class="title">АЗС</div>
    </div>
  </div>

  <button class="big-btn" onclick="getLocation()">
    📍 Визначити мою геолокацію
  </button>

  <div class="footer">
    MVP для хакатону • інтеграція Google Maps
  </div>

</div>

<script>

let lat = null;
let lng = null;

function getLocation() {
  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    status.innerText = "Геолокація не підтримується";
    return;
  }

  status.innerText = "🔄 Визначаємо місцезнаходження...";

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;

      status.innerText = "✅ Геолокацію визначено! Тепер оберіть категорію.";
    },
    () => {
      status.innerText = "❌ Доступ до геолокації заборонено";
    }
  );
}

function search(type) {

  if (!lat || !lng) {
    alert("Спочатку натисніть 'Визначити геолокацію'");
    return;
  }

  let query = "ATM";

  if (type === "ukrsib") query = "УКРСИББАНК банкомат";
  if (type === "atm") query = "банкомат";
  if (type === "cashback") query = "cash back магазин";
  if (type === "fuel") query = "АЗС готівка";

  const url = `https://www.google.com/maps/search/${query}/@${lat},${lng},15z`;

  document.getElementById("status").innerText =
    "🗺️ Відкриваємо Google Maps...";

  window.open(url, "_blank");
}

</script>

</body>
</html>
